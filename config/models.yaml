# config/models.yaml
# 모델 파라미터 단일 진실 소스 (Single Source of Truth)
# 코드 내 모델명 하드코딩 금지 — 항상 이 파일에서 읽기

defaults:
  code:       qwen2.5-coder:7b
  chat:       gemma3:4b
  agent:      qwen2.5:7b
  embed:      nomic-embed-text
  classifier: qwen2.5-coder:1.5b
  fallback:   mistral:7b

# RAM 기반 자동 프로파일 선택
profiles:
  ram_8gb:
    code:       qwen2.5-coder:3b
    chat:       gemma3:2b
    agent:      qwen2.5:3b
    classifier: qwen2.5-coder:1.5b
    embed:      nomic-embed-text

  ram_16gb:
    code:       qwen2.5-coder:7b
    chat:       gemma3:4b
    agent:      qwen2.5:7b
    classifier: qwen2.5-coder:1.5b
    embed:      nomic-embed-text

# 기본 파라미터 (presets에 없는 모델 폴백)
default_params:
  temperature:    0.3
  top_p:          0.9
  top_k:          30
  num_ctx:        8192
  num_predict:    1024

# 모델별 파라미터 프리셋
presets:
  # ── 코드 생성 ──────────────────────────────────────────────
  qwen2.5-coder:7b:
    temperature:    0.1
    top_p:          0.9
    top_k:          20
    repeat_penalty: 1.1
    num_ctx:        8192
    num_predict:    2048

  qwen2.5-coder:3b:
    temperature:    0.1
    top_p:          0.9
    top_k:          20
    repeat_penalty: 1.1
    num_ctx:        8192
    num_predict:    2048

  qwen2.5-coder:1.5b:
    temperature:    0.0   # 분류는 결정론적으로
    top_p:          0.9
    top_k:          10
    num_ctx:        2048
    num_predict:    64

  # ── 채팅 ───────────────────────────────────────────────────
  gemma3:4b:
    temperature:    0.7
    top_p:          0.95
    top_k:          40
    num_ctx:        32768
    num_predict:    1024

  gemma3:2b:
    temperature:    0.7
    top_p:          0.95
    top_k:          40
    num_ctx:        16384
    num_predict:    1024

  # ── 에이전트 추론 ──────────────────────────────────────────
  qwen2.5:7b:
    temperature:    0.2
    top_p:          0.9
    top_k:          30
    num_ctx:        8192
    num_predict:    1024

  qwen2.5:3b:
    temperature:    0.2
    top_p:          0.9
    top_k:          30
    num_ctx:        8192
    num_predict:    1024

  # ── 코드 리뷰 ──────────────────────────────────────────────
  deepseek-coder:6.7b:
    temperature:    0.1
    top_p:          0.9
    top_k:          20
    num_ctx:        16384
    num_predict:    2048

  deepseek-coder:1.3b:
    temperature:    0.1
    top_p:          0.9
    top_k:          20
    num_ctx:        8192
    num_predict:    1024

  # ── 임베딩 (파라미터 최소) ────────────────────────────────
  nomic-embed-text:
    num_ctx:        8192

  # ── 폴백 ─────────────────────────────────────────────────
  mistral:7b:
    temperature:    0.3
    top_p:          0.9
    top_k:          30
    num_ctx:        8192
    num_predict:    1024

  phi3:3.8b:
    temperature:    0.3
    top_p:          0.9
    num_ctx:        8192
    num_predict:    1024

  # ── 커스텀 모델 추가 예시 ─────────────────────────────────
  # llama3.2:3b:
  #   temperature:  0.5
  #   num_ctx:      8192
  #   num_predict:  1024
